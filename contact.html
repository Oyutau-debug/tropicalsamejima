<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問合わせフォーム</title>
</head>
<body bgcolor="#FFFFFF" text="#000000" link="#0000FF" vlink="#800080">

    <center>
        <h1>お問い合わせ</h1>
        <hr width="500">
    </center>

    <p align="center">
        当サイトへのご意見、ご感想、相互リンクの依頼などはこちらからどうぞ。<br>
        返信にはお時間をいただく場合があります。
    </p>

    <div align="center">
        <form action="#" method="post">
            <table border="1" cellpadding="5" cellspacing="0" bgcolor="#F0F0F0">
                <tr>
                    <td bgcolor="#CCCCCC"><b>お名前</b></td>
                    <td><input type="text" name="name" size="30"></td>
                </tr>
                <tr>
                    <td bgcolor="#CCCCCC"><b>メールアドレス</b></td>
                    <td><input type="text" name="mail" size="30"></td>
                </tr>
                <tr>
                    <td bgcolor="#CCCCCC"><b>件名</b></td>
                    <td><input type="text" name="subject" size="40"></td>
                </tr>
                <tr>
                    <td bgcolor="#CCCCCC"><b>メッセージ内容</b></td>
                    <td>
                        <textarea name="message" rows="8" cols="40"></textarea>
                    </td>
                </tr>
            </table>

            <p>
                <input type="submit" value="送信する">
                <input type="reset" value="リセット">
            </p>
        </form>
    </div>

    <hr width="500">

    <center>
        <p>
            [ <a href="index.html">トップへ戻る</a> ]
        </p>
        <p>
            <font size="2">
                Copyright (C) 2026 YourName All Rights Reserved.
            </font>
        </p>
    </center>

</body>
</html>
