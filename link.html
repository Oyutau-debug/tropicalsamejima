<!DOCTYPE html>

    <style>
        .link-container {
            max-width: 600px;
            margin: 20px auto;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        .link-item {
            display: flex;
            align-items: center; /* アイコンと文字を中央で揃える */
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.2s;
        }
        .link-item:hover {
            background-color: #f9f9f9;
        }
        .link-icon {
            width: 48px;
            height: 48px;
            object-fit: cover; /* 画像が歪まないように調整 */
            border-radius: 4px; /* 少し角を丸くすると今風になります */
            margin-right: 15px; /* アイコンと文字の間の余白 */
            background-color: #eee; /* 画像がない時の予備色 */
        }
        .site-info {
            display: flex;
            flex-direction: column;
        }
        .site-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #0066cc;
        }
        .site-desc {

            color: #666;
            margin-top: 2px;
        }

        .back-home { margin-top: 100px; text-align: center; font-size: 0.9em; }

</head>
