<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #ffffff; /* 真っ白な背景 */
            color: #333333;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.8rem;
            color: #888;
        }

        /* リンクの塊 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 12px 0; /* 左右のパディングをなくしてスッキリ */
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #f0f0f0; /* 下線だけの区切り */
            transition: opacity 0.2s;
        }

        .link-item:hover {
            opacity: 0.6;
        }

        .icon {
            width: 32px; /* 少し小さめに */
            height: 32px;
            margin-right: 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .label {
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .arrow {
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Contact</h1>
        <p>Connect with me.</p>
    </header>

    <div class="links">
        <a href="#" class="link-item">
            <div class="icon">𝕏</div>
            <span class="label">X (Twitter)</span>
            <span class="arrow">→</span>
        </a>

        <a href="#" class="link-item">
            <div class="icon">✉</div>
            <span class="label">Email</span>
            <span class="arrow">→</span>
        </a>

        <a href="#" class="link-item">
            <div class="icon">◎</div>
            <span class="label">Portfolio</span>
            <span class="arrow">→</span>
        </a>
    </div>
</div>

</body>
</html>
