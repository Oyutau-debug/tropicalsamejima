<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>System Error</title>
    <style>
        body {
            background-color: #008080; /* Windows 95風の背景色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .window {
            width: 350px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 10px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .content {
            padding: 20px;
            font-family: "MS UI Gothic", sans-serif;
            font-size: 13px;
            display: flex;
            align-items: center;
        }

        .icon {
            margin-right: 20px;
            font-size: 32px;
            background: #ff0000;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            padding-bottom: 15px;
        }

        .btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 5px 20px;
            margin: 0 5px;
            font-size: 12px;
            text-decoration: none;
            color: #000;
        }

        .btn:active {
            border-color: #808080 #fff #fff #808080;
        }
    </style>
</head>

<body>
    

    <div class="window">
        <div class="title-bar">
            <span>Security Alert</span>
            <span>×</span>
        </div>
        <div class="content">
            <div class="icon">!</div>
            <div>
                予期しないアクセスを検出しました。<br>
                個人情報保護プロトコルを解除しますか？
            </div>
        </div>
        <div class="buttons">
            <a href="ura.html" class="btn">はい(Y)</a>
            <a href="index.html" class="btn">いいえ(N)</a>
        </div>
    </div>

</body>
</html>
